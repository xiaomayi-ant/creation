name: Deploy to Alibaba Cloud ECS

on:
  workflow_dispatch:

env:
  DEPLOY_DIR: /opt/playbook-writer

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e


            # 1. 进入并确保部署目录存在
            mkdir -p ${{ env.DEPLOY_DIR }}
            cd ${{ env.DEPLOY_DIR }}


            # 2. 这里的逻辑是：如果没代码就 clone，有代码就 reset 更新
            if [ ! -d ".git" ]; then
              git clone ${{ secrets.REPO_URL }} .
            else
              git fetch --all
              git reset --hard origin/main
            fi


            # 3. 写入你之前在 Secrets 填好的环境变量
            echo '${{ secrets.BACKEND_ENV }}' > backend/.env


            # 4. 启动容器（--build 会确保你新提交的代码被编译进去）
            docker compose down
            docker compose up --build -d


            # 5. 清理过期的镜像，节省磁盘空间
            docker image prune -f
