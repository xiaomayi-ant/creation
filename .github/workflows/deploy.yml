name: Build Creation Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/creation-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/creation-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tags
        id: meta
        run: |
          echo "sha_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        run: |
          docker build \
            -t "$BACKEND_IMAGE:${{ steps.meta.outputs.sha_tag }}" \
            -t "$BACKEND_IMAGE:${{ steps.meta.outputs.short_sha }}" \
            -t "$BACKEND_IMAGE:latest" \
            ./backend
          docker push "$BACKEND_IMAGE:${{ steps.meta.outputs.sha_tag }}"
          docker push "$BACKEND_IMAGE:${{ steps.meta.outputs.short_sha }}"
          docker push "$BACKEND_IMAGE:latest"

      - name: Build and push frontend image
        run: |
          docker build \
            -t "$FRONTEND_IMAGE:${{ steps.meta.outputs.sha_tag }}" \
            -t "$FRONTEND_IMAGE:${{ steps.meta.outputs.short_sha }}" \
            -t "$FRONTEND_IMAGE:latest" \
            ./frontend
          docker push "$FRONTEND_IMAGE:${{ steps.meta.outputs.sha_tag }}"
          docker push "$FRONTEND_IMAGE:${{ steps.meta.outputs.short_sha }}"
          docker push "$FRONTEND_IMAGE:latest"

      - name: Print image names
        run: |
          echo "Backend image:  $BACKEND_IMAGE:${{ steps.meta.outputs.sha_tag }}"
          echo "Frontend image: $FRONTEND_IMAGE:${{ steps.meta.outputs.sha_tag }}"
