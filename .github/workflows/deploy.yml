name: Deploy to Alibaba Cloud ECS (Pull Image) of comic-drama

on:
  workflow_dispatch:

env:
  DEPLOY_DIR: /opt/playbook-writer
  IMAGE: ghcr.io/${{ github.repository }}/playbook-writer-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        run: |
          docker build -t $IMAGE:${{ steps.meta.outputs.image_tag }} -t $IMAGE:latest ./backend
          docker push $IMAGE:${{ steps.meta.outputs.image_tag }}
          docker push $IMAGE:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH (pull image only)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            mkdir -p ${{ env.DEPLOY_DIR }}
            cd ${{ env.DEPLOY_DIR }}

            # 首次部署可把 docker-compose.yml 放到服务器固定目录，或由 scp/rsync 同步过来
            # 这里假设 docker-compose.yml 已存在，且服务使用 image: 而不是 build:

            # 登录镜像仓库（如果是私有仓库）
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # 可选：注入环境变量
            echo '${{ secrets.BACKEND_ENV }}' > backend.env

            # 关键：使用固定 tag，避免 latest 漂移
            export BACKEND_IMAGE=${{ env.IMAGE }}:${{ needs.build-and-push.outputs.image_tag }}

            docker compose pull
            docker compose up -d --remove-orphans

            docker image prune -f
